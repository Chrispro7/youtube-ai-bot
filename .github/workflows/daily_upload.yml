name: Daily YouTube AI Upload

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install edge-tts moviepy pillow
          pip install anthropic google-api-python-client
          pip install google-auth-oauthlib requests numpy

      - name: Write YouTube credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: echo "$YOUTUBE_TOKEN" > youtube_token.json

      - name: Run AI pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NICHE: ${{ secrets.CHANNEL_NICHE }}
        run: python main.py
