const topicScript = `# topic_generator.py
import anthropic, random, os

def get_topic(niche: str) -> str:
    """Generate a viral-worthy video topic using Claude."""
    client = anthropic.Anthropic(api_key=os.getenv("ANTHROPIC_API_KEY"))

    prompt = f"""Generate ONE punchy, clickable YouTube Shorts topic about: {niche}
Rules:
- Under 60 characters
- Creates curiosity or surprise
- No hashtags, no emojis
- Just the title, nothing else
Examples: "Why Your Phone Battery Degrades So Fast"
          "The Hidden Trick in Every ATM"
          "5 Things You Never Knew About Elevators" """

    msg = client.messages.create(
        model="claude-haiku-4-5",   # Cheapest/fastest
        max_tokens=80,
        messages=[{"role": "user", "content": prompt}]
    )
    return msg.content[0].text.strip()
`;

const scriptScript = `# script_writer.py
import anthropic, os

def write_script(topic: str) -> str:
    """Write a 45-60 second YouTube Shorts script."""
    client = anthropic.Anthropic(api_key=os.getenv("ANTHROPIC_API_KEY"))

    msg = client.messages.create(
        model="claude-haiku-4-5",
        max_tokens=400,
        messages=[{
            "role": "user",
            "content": f"""Write a YouTube Shorts voiceover script for: "{topic}"
Format: Plain spoken text only, no stage directions.
Length: 90-120 words (fits in ~45 seconds).
Style: Conversational, engaging, ends with a surprising fact.
No intro like "Hey guys", start directly with the hook."""
        }]
    )
    return msg.content[0].text.strip()
`;

const ttsScript = `# tts_engine.py — FREE Microsoft Edge TTS
import asyncio, os
import edge_tts   # pip install edge-tts

VOICES = [
    "en-US-GuyNeural",     # Male, deep
    "en-US-JennyNeural",   # Female, clear
    "en-GB-RyanNeural",    # British male
    "en-AU-WilliamNeural", # Australian male
]

def generate_voiceover(text: str, voice: str = "en-US-GuyNeural") -> str:
    """Generate speech audio from text. Completely FREE."""
    output = f"/tmp/voiceover_{hash(text) % 99999}.mp3"

    async def _generate():
        communicate = edge_tts.Communicate(
            text  = text,
            voice = voice,
            rate  = "+8%",    # Slightly faster for Shorts
            pitch = "+0Hz"
        )
        await communicate.save(output)

    asyncio.run(_generate())
    return output
`;

const videoScript = `# video_builder.py — Build video from images + audio
import os, requests, random, textwrap
from moviepy.editor import *
from PIL import Image, ImageDraw, ImageFont
import numpy as np

PEXELS_KEY = os.getenv("PEXELS_API_KEY")   # Free at pexels.com/api

def get_background_clips(query: str, count: int = 4) -> list:
    """Fetch free stock video clips from Pexels."""
    url = "https://api.pexels.com/videos/search"
    headers = {"Authorization": PEXELS_KEY}
    params  = {"query": query, "per_page": count, "size": "medium"}

    r = requests.get(url, headers=headers, params=params)
    data = r.json()
    paths = []

    for video in data.get("videos", [])[:count]:
        file_url = video["video_files"][0]["link"]
        path = f"/tmp/clip_{video['id']}.mp4"
        if not os.path.exists(path):
            with open(path, "wb") as f:
                f.write(requests.get(file_url).content)
        paths.append(path)

    return paths

def make_text_overlay(text: str, size=(1080, 1920)) -> np.ndarray:
    """Generate a text frame as numpy array."""
    img  = Image.new("RGBA", size, (0,0,0,160))
    draw = ImageDraw.Draw(img)
    try:
        font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 52)
    except:
        font = ImageFont.load_default()

    wrapped = textwrap.fill(text, 22)
    draw.multiline_text((540, 960), wrapped, font=font, fill="white",
                        anchor="mm", align="center",
                        stroke_width=3, stroke_fill="black")
    return np.array(img.convert("RGB"))

def build_video(topic: str, script: str, audio_path: str) -> str:
    """Assemble final 9:16 video with background + audio + text."""
    audio    = AudioFileClip(audio_path)
    duration = audio.duration
    output   = f"/tmp/final_{hash(topic) % 99999}.mp4"

    # Try Pexels video clips first
    clips = []
    try:
        clip_paths = get_background_clips(topic.split()[-1], count=3)
        for cp in clip_paths:
            vc = VideoFileClip(cp).resize((1080, 1920))
            clips.append(vc.subclip(0, min(vc.duration, duration / len(clip_paths))))
    except:
        pass  # Fallback to solid colour background

    if clips:
        bg = concatenate_videoclips(clips).subclip(0, duration)
    else:
        bg = ColorClip((1080, 1920), color=(10,10,30), duration=duration)

    # Text overlay with topic title
    txt_frames = [make_text_overlay(topic, (1080, 1920))] * int(duration * 30)
    txt_clip   = (ImageSequenceClip(txt_frames, fps=30)
                  .set_duration(duration)
                  .set_opacity(0.85))

    final = (CompositeVideoClip([bg, txt_clip])
             .set_audio(audio))

    final.write_videofile(output, fps=30, codec="libx264",
                          audio_codec="aac", logger=None)
    return output
`;

const uploaderScript = `# uploader.py — YouTube Data API v3 (FREE)
import os
from google.oauth2.credentials import Credentials
from googleapiclient.discovery import build
from googleapiclient.http import MediaFileUpload

def upload_to_youtube(video_path, title, description, tags, category="22"):
    """Upload video to YouTube. Fully free via YouTube Data API v3."""

    # Load saved OAuth credentials (created once during setup)
    creds = Credentials.from_authorized_user_file(
        "youtube_token.json",
        scopes=["https://www.googleapis.com/auth/youtube.upload"]
    )

    youtube = build("youtube", "v3", credentials=creds)

    body = {
        "snippet": {
            "title":       title[:100],
            "description": description,
            "tags":        tags,
            "categoryId":  category,
        },
        "status": {
            "privacyStatus":           "public",
            "selfDeclaredMadeForKids": False,
        }
    }

    media = MediaFileUpload(video_path, mimetype="video/mp4",
                            resumable=True, chunksize=1024*1024)

    request = youtube.videos().insert(
        part="snippet,status", body=body, media_body=media
    )

    response = None
    while response is None:
        status, response = request.next_chunk()
        if status:
            print(f"  Upload {int(status.progress() * 100)}%")

    return response
`;

