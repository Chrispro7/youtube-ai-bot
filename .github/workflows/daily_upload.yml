    "client_secrets.json", SCOPES
)
creds = flow.run_local_server(port=0)

# Save token — paste its contents into GitHub Secret: YOUTUBE_TOKEN
with open("youtube_token.json", "w") as f:
    f.write(creds.to_json())

print("✅ youtube_token.json saved! Add it to GitHub Secrets.")`;

